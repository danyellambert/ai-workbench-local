name: historical-phase8-evals

# Historical deterministic eval workflow for the earlier Phase 8 evaluation layer.
# The current push/pull_request product contract lives in product-ci.yml.
# Run this manually when you specifically want to validate the historical eval suite.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run eval-related unit tests
        run: |
          python -m unittest \
            tests.test_app_bootstrap_smoke_unittest \
            tests.test_streamlit_app_smoke_unittest \
            tests.test_phase8_eval_store_unittest \
            tests.test_phase8_eval_diagnosis_unittest \
            tests.test_phase8_agent_workflow_eval_unittest \
            tests.test_phase8_live_evals_unittest \
            tests.test_runtime_execution_log_unittest \
            tests.test_runtime_snapshot_unittest \
            tests.test_phase5_real_document_eval_unittest

      - name: Run deterministic workflow eval suite
        run: |
          python scripts/run_agent_workflow_eval.py --out phase5_eval/reports/phase8_agent_workflow_eval_ci.json

      - name: Generate eval summary and diagnosis
        run: |
          python scripts/report_eval_store_summary.py --limit 10 --out phase5_eval/reports/phase8_eval_summary_ci.json
          python scripts/report_eval_store_diagnosis.py --out phase5_eval/reports/phase8_eval_diagnosis_ci.json
