name: product-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: product-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  product-contract:
    name: Product API, frontend, and compose contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check current Product API Python entrypoints
        run: |
          python -m py_compile \
            main_product_api.py \
            src/product/api.py \
            src/product/lab.py \
            src/product/service.py \
            src/app/product_bootstrap.py

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Validate shell scripts
        run: |
          bash -n scripts/run_local_dev.sh
          bash -n scripts/run_local_docker.sh
          bash -n scripts/deploy_aws.sh
          bash -n scripts/smoke_aws.sh
          bash -n scripts/build_deployment_bundle.sh

      - name: Validate Docker and AWS compose contracts without deployment
        env:
          SKIP_LOCAL_DEV_CHECK: "1"
          SKIP_LOCAL_DOCKER_CHECK: "0"
        run: scripts/readiness_multi_environment_contract_check.sh


  python-current-test-gate:
    name: Python current test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run current Python test gate
        run: scripts/run_current_test_gate.sh
