name: deploy-aws

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Deploy mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - execute

  workflow_run:
    workflows:
      - product-ci
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-aws-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy AWS code-only via SSM
    runs-on: ubuntu-latest

    environment:
      name: aws-production
      url: ${{ vars.AWS_PRODUCTION_URL }}

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout deploy commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Mask deployment identifiers
        run: |
          echo "::add-mask::${{ vars.AWS_EC2_INSTANCE_ID }}"
          echo "::add-mask::${{ vars.AWS_DEPLOY_APP_DIR }}"
          echo "::add-mask::/opt/ai-decision-studio"
          echo "::add-mask::${{ vars.AWS_PRODUCTION_URL }}"

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      - name: Validate deploy scripts
        run: |
          set -euo pipefail
          bash -n scripts/build_deployment_bundle.sh
          bash -n scripts/deploy_aws_code_only_ssm.sh
          bash -n scripts/deploy_aws_code_only_ssm_remote.sh
          bash -n scripts/deploy_aws.sh
          bash -n scripts/smoke_aws.sh

      - name: Run AWS code-only deploy through SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_EC2_INSTANCE_ID: ${{ vars.AWS_EC2_INSTANCE_ID }}
          AWS_DEPLOY_APP_DIR: ${{ vars.AWS_DEPLOY_APP_DIR }}
          REPO: danyellambert/ai-workbench-local
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          SSM_DEPLOY_VERBOSE: "0"
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="--${{ inputs.mode }}"
          else
            MODE="--execute"
          fi

          echo "deploy_mode=$MODE"
          scripts/deploy_aws_code_only_ssm.sh "$MODE"
