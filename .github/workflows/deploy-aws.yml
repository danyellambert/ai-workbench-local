name: deploy-aws

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Deploy mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - execute
  workflow_run:
    workflows:
      - product-ci
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-aws-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy AWS code-only
    runs-on: ubuntu-latest
    environment: production

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout deploy commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure SSH
        env:
          AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          AWS_EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_EC2_HOST}" ]; then
            echo "ERROR: missing secret AWS_EC2_HOST" >&2
            exit 1
          fi

          if [ -z "${AWS_EC2_SSH_KEY}" ]; then
            echo "ERROR: missing secret AWS_EC2_SSH_KEY" >&2
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$AWS_EC2_SSH_KEY" > "$HOME/.ssh/ai-decision-studio-aws.pem"
          chmod 600 "$HOME/.ssh/ai-decision-studio-aws.pem"

          ssh-keyscan -H "$AWS_EC2_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Validate deploy scripts
        run: |
          set -euo pipefail
          bash -n scripts/build_deployment_bundle.sh
          bash -n scripts/deploy_aws_code_only.sh
          bash -n scripts/deploy_aws.sh
          bash -n scripts/smoke_aws.sh

      - name: Run AWS code-only deploy
        env:
          EC2_IP: ${{ secrets.AWS_EC2_HOST }}
          EC2_USER: ${{ secrets.AWS_EC2_USER || 'ubuntu' }}
          SSH_KEY: ${{ github.workspace }}/../.ssh-placeholder
        run: |
          set -euo pipefail

          export SSH_KEY="$HOME/.ssh/ai-decision-studio-aws.pem"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="--${{ inputs.mode }}"
          else
            MODE="--execute"
          fi

          echo "deploy_mode=$MODE"
          scripts/deploy_aws_code_only.sh "$MODE"
