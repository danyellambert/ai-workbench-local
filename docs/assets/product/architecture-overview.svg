    <rect x="1350" y="770" width="160" height="72" rx="12" class="dashed" />
    <rect x="1372" y="790" width="28" height="36" rx="4" fill="#2563EB" />
    <rect x="1406" y="790" width="28" height="36" rx="4" fill="#2563EB" />
    <text x="1450" y="801" class="tiny">Trello</text>
    <rect x="1450" y="814" width="32" height="28" rx="3" fill="#111827" />
    <text x="1460" y="834" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="900" fill="#FFFFFF">N</text>
    <text x="1488" y="834" class="tiny">Notion</text>
  </g>

  <path d="M1020 430C1130 510 1238 570 1320 652" stroke="#F97316" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="1182" y="585" class="tiny">delivery actions</text>

  <g filter="url(#shadow)">
    <rect x="1140" y="112" width="372" height="90" rx="16" fill="#FFF7ED" stroke="#FDBA74" />
