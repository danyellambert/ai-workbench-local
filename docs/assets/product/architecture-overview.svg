<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Decision Studio product architecture</title>
  <desc id="desc">Architecture canvas showing the AI Decision Studio frontend, Product API, workflow services, AI runtime, delivery integrations, sidecars, and mounted data roots.</desc>

  <rect width="1600" height="1120" fill="#F8FAFC" />
  <rect x="26" y="26" width="1548" height="1068" rx="18" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="2" />

  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12" />
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-cyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#0891B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#16A34A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <style>
      .h1 { font: 800 38px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .sub { font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .cap { font: 800 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: 1.8px; }
      .title { font: 800 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 700 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 500 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .mono { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #334155; }
      .card { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.6; }
      .zone { fill: #F8FAFC; stroke: #E2E8F0; stroke-width: 1.6; }
      .dashed { fill: #FFFFFF; stroke: #111827; stroke-width: 1.8; stroke-dasharray: 8 7; }
      .chip { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1; }
    </style>
  </defs>

  <text x="72" y="82" class="cap">CURRENT PRODUCT ARCHITECTURE</text>
  <text x="72" y="126" class="h1">AI Decision Studio</text>
  <text x="72" y="158" class="sub">Document-grounded decision workflows backed by a measurable AI engineering layer and portable Docker/AWS runtime roots.</text>

  <g transform="translate(1236 58)">
    <rect width="276" height="82" rx="18" fill="#F8FAFC" stroke="#CBD5E1" />
    <text x="22" y="32" class="cap">DEPLOYMENT</text>
    <text x="22" y="60" class="label">Local Docker + AWS slim</text>
  </g>

  <line x1="548" y1="210" x2="548" y2="885" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="12 12" />
  <text x="360" y="238" class="cap">PUBLIC EDGE</text>
  <text x="590" y="238" class="cap">PRIVATE PRODUCT NETWORK</text>

  <g filter="url(#shadow)">
    <rect x="78" y="322" width="216" height="126" rx="12" class="card" />
    <rect x="104" y="356" width="62" height="44" rx="7" fill="#2563EB" />
    <text x="124" y="384" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="900" fill="#FFFFFF">UI</text>
    <text x="184" y="360" class="title">User</text>
    <text x="184" y="386" class="body">browser session</text>
    <text x="104" y="430" class="tiny">React/Vite workbench</text>
  </g>

