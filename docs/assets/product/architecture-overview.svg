    <text x="376" y="351" class="body">static app served by Nginx</text>
    <text x="376" y="377" class="mono">Dockerfile.frontend</text>
    <rect x="376" y="406" width="50" height="42" rx="8" fill="#22C55E" />
    <text x="393" y="433" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="900" fill="#FFFFFF">N</text>
    <g transform="translate(444 411)">
      <ellipse cx="24" cy="18" rx="24" ry="8" stroke="#38BDF8" stroke-width="2" />
      <ellipse cx="24" cy="18" rx="24" ry="8" stroke="#38BDF8" stroke-width="2" transform="rotate(60 24 18)" />
      <ellipse cx="24" cy="18" rx="24" ry="8" stroke="#38BDF8" stroke-width="2" transform="rotate(120 24 18)" />
      <circle cx="24" cy="18" r="4" fill="#38BDF8" />
    </g>
    <path d="M532 410L568 410L548 448H584L528 474L548 435H516L532 410Z" fill="#A78BFA" />
  </g>

  <path d="M294 385H344" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="309" y="368" class="tiny">HTTPS</text>

  <g filter="url(#shadow)">
    <rect x="690" y="282" width="330" height="206" rx="12" class="dashed" />
    <rect x="724" y="330" width="64" height="52" rx="8" fill="#0EA5E9" />
    <text x="738" y="363" font-family="ui-sans-serif, system-ui" font-size="23" font-weight="900" fill="#FFFFFF">PY</text>
