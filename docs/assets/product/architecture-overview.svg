    <rect x="824" y="418" width="68" height="30" rx="15" fill="#ECFEFF" stroke="#A5F3FC" />
    <text x="846" y="438" class="tiny">/lab</text>
    <rect x="904" y="418" width="82" height="30" rx="15" fill="#F8FAFC" stroke="#CBD5E1" />
    <text x="927" y="438" class="tiny">/auth</text>
  </g>

  <path d="M604 385H690" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="627" y="368" class="tiny">HTTP JSON</text>

  <g filter="url(#shadow)">
    <rect x="1132" y="244" width="380" height="284" rx="18" class="zone" />
    <text x="1180" y="278" class="title">AI Runtime Context</text>
    <rect x="1164" y="310" width="316" height="84" rx="12" class="dashed" />
    <text x="1194" y="340" class="label">Model providers</text>
    <rect x="1194" y="356" width="66" height="28" rx="14" fill="#111827" />
    <text x="1209" y="375" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="800" fill="#FFFFFF">Ollama</text>
    <circle cx="1294" cy="370" r="15" fill="#FFFFFF" stroke="#CBD5E1" />
    <path d="M1285 370C1291 359 1300 359 1306 370C1300 381 1291 381 1285 370Z" stroke="#111827" stroke-width="2" fill="none" />
    <text x="1322" y="375" class="tiny">OpenAI</text>
    <rect x="1392" y="356" width="58" height="28" rx="14" fill="#FFFAEB" stroke="#FDE68A" />
    <text x="1408" y="375" class="tiny">HF</text>

    <rect x="1164" y="420" width="316" height="78" rx="12" class="dashed" />
    <text x="1194" y="450" class="label">RAG index</text>
    <ellipse cx="1318" cy="454" rx="38" ry="12" fill="#22D3EE" />
    <rect x="1280" y="454" width="76" height="28" fill="#0891B2" />
    <ellipse cx="1318" cy="482" rx="38" ry="12" fill="#0E7490" />
    <text x="1294" y="463" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="900" fill="#FFFFFF">Chroma</text>
    <text x="1374" y="460" class="tiny">LangChain</text>
    <text x="1374" y="480" class="tiny">embeddings</text>
  </g>

  <path d="M1020 365H1132" stroke="#0891B2" stroke-width="3" marker-end="url(#arrow-cyan)" />
  <text x="1050" y="347" class="tiny">model calls</text>

  <g filter="url(#shadow)">
    <rect x="620" y="610" width="350" height="262" rx="18" class="zone" />
    <text x="675" y="646" class="title">Workflow Context</text>
    <rect x="652" y="678" width="286" height="74" rx="12" class="dashed" />
    <text x="682" y="708" class="label">Business workflows</text>
    <text x="682" y="734" class="body">Review, compare, plan, candidate review</text>
    <rect x="652" y="778" width="286" height="64" rx="12" class="dashed" />
    <text x="682" y="807" class="label">Run history + telemetry</text>
    <text x="682" y="832" class="mono">src/product + src/storage</text>
  </g>

  <path d="M842 488V608" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="862" y="552" class="tiny">workflow execution</text>

  <g filter="url(#shadow)">
    <rect x="1010" y="610" width="270" height="262" rx="18" class="zone" />
    <text x="1064" y="646" class="title">AI Lab Context</text>
    <rect x="1040" y="678" width="210" height="64" rx="12" class="dashed" />
    <text x="1070" y="707" class="label">Evals</text>
    <text x="1070" y="731" class="body">benchmarks and diagnosis</text>
    <rect x="1040" y="770" width="210" height="72" rx="12" class="dashed" />
    <text x="1070" y="799" class="label">Observability</text>
