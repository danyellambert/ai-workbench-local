    <text x="1168" y="174" class="body">Nextcloud, Ollama, ppt-creator, Docker volumes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="920" width="1434" height="114" rx="18" fill="#F8FAFC" stroke="#CBD5E1" />
    <text x="108" y="956" class="cap">MOUNTED DATA ROOTS</text>
    <text x="108" y="984" class="body">Product API reads /app/baseline and writes /app/runtime, /app/artifacts, and /app/users through the same local Docker and AWS slim contract.</text>
    <rect x="760" y="970" width="104" height="34" rx="17" fill="#EFF6FF" stroke="#BFDBFE" />
    <text x="782" y="992" class="tiny">baseline</text>
    <rect x="878" y="970" width="102" height="34" rx="17" fill="#ECFEFF" stroke="#A5F3FC" />
    <text x="902" y="992" class="tiny">runtime</text>
    <rect x="994" y="970" width="112" height="34" rx="17" fill="#FFF7ED" stroke="#FDBA74" />
    <text x="1018" y="992" class="tiny">artifacts</text>
    <rect x="1120" y="970" width="82" height="34" rx="17" fill="#F0FDF4" stroke="#BBF7D0" />
    <text x="1144" y="992" class="tiny">users</text>
    <rect x="1340" y="970" width="82" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1" />
    <text x="1364" y="992" class="tiny">Docker</text>
    <rect x="1436" y="970" width="58" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1" />
    <text x="1454" y="992" class="tiny">AWS</text>
