<svg width="1800" height="1180" viewBox="0 0 1800 1180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Decision Studio architecture overview</title>
  <desc id="desc">Architecture overview showing the public edge, Docker Compose product runtime, Product API, RAG pipeline, local Ollama embeddings container, hosted generation APIs, Nextcloud, ppt-creator, external delivery targets, mounted data roots, and operations boundary.</desc>

