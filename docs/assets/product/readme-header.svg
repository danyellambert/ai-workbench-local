<svg width="1200" height="240" viewBox="0 0 1200 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Decision Studio by Danyel Lambert</title>
  <desc id="desc">A dark horizontal README banner with the AI Decision Studio Keystone logo, product name, and author credit.</desc>
  <rect width="1200" height="240" rx="0" fill="#020817" />
  <rect x="1" y="1" width="1198" height="238" stroke="#172554" stroke-opacity="0.45" />

  <defs>
    <linearGradient id="ks-outer" x1="270" y1="64" x2="270" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DB7FF" />
      <stop offset="0.52" stop-color="#2563EB" />
      <stop offset="1" stop-color="#1E2A78" />
    </linearGradient>
    <linearGradient id="ks-left" x1="214" y1="120" x2="270" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18265F" />
      <stop offset="1" stop-color="#2546A5" />
    </linearGradient>
    <linearGradient id="ks-right" x1="270" y1="120" x2="326" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93C5FD" />
      <stop offset="1" stop-color="#3B82F6" />
    </linearGradient>
    <radialGradient id="ks-core" cx="270" cy="120" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="0.58" stop-color="#BFDBFE" />
      <stop offset="1" stop-color="#3B82F6" />
    </radialGradient>
    <radialGradient id="ks-glow" cx="270" cy="120" r="68" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.52" />
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <circle cx="270" cy="120" r="68" fill="url(#ks-glow)" />
  <path d="M270 64L326 120L270 176L214 120L270 64Z" fill="url(#ks-outer)" />
  <path d="M270 64L214 120L270 176V120Z" fill="url(#ks-left)" fill-opacity="0.96" />
  <path d="M270 64L326 120L270 176V120Z" fill="url(#ks-right)" fill-opacity="0.88" />
  <path d="M270 64L326 120H270H214L270 64Z" fill="#FFFFFF" fill-opacity="0.09" />
  <path d="M270 88L302 120L270 152L238 120L270 88Z" fill="#081226" stroke="#93C5FD" stroke-opacity="0.58" stroke-width="2.4" />
  <circle cx="270" cy="120" r="9.5" fill="url(#ks-core)" />
  <circle cx="270" cy="120" r="3.5" fill="#FFFFFF" />

  <text x="356" y="133" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="50" font-weight="750" letter-spacing="-0.6" textLength="400" lengthAdjust="spacingAndGlyphs">
    AI Decision Studio
  </text>
  <text x="786" y="132" fill="#8190B4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="500" textLength="200" lengthAdjust="spacingAndGlyphs">
    by Danyel Lambert
  </text>
